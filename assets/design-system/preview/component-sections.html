<!doctype html><meta charset="utf-8">
<title>Section headings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B0E13;color:#E8ECF2;padding:24px 28px;display:flex;flex-direction:column;gap:14px}
  .h{font-size:15px;letter-spacing:0.6px;text-transform:uppercase;color:#C8CDD6;font-weight:700;display:flex;align-items:center;gap:10px;padding:6px 0}
  .bar{display:inline-block;width:4px;height:16px;border-radius:2px;flex-shrink:0}
  .b-default{background:linear-gradient(180deg,#10F5A3,#0FCC88);box-shadow:0 0 8px rgba(16,245,163,0.5)}
  .b-purple{background:linear-gradient(180deg,#B07AFF,#B07AFFcc);box-shadow:0 0 8px rgba(176,122,255,0.6)}
  .b-blue{background:linear-gradient(180deg,#6FA9D6,#6FA9D6cc);box-shadow:0 0 8px rgba(111,169,214,0.6)}
  .b-warn{background:linear-gradient(180deg,#FFB347,#FFB347cc);box-shadow:0 0 8px rgba(255,179,71,0.6)}
  .b-danger{background:linear-gradient(180deg,#FF6B7A,#FF6B7Acc);box-shadow:0 0 8px rgba(255,107,122,0.6)}
  .note{font-size:11px;color:#6E7A8C;border-left:1px solid #1F2530;padding:6px 14px;margin-top:8px;line-height:1.55}
</style>
<div class="h"><span class="bar b-default"></span><span>Top Estabelecimentos</span></div>
<div class="h"><span class="bar b-purple"></span><span>Gastos por Categoria</span></div>
<div class="h"><span class="bar b-blue"></span><span>Comparativo com snapshot anterior</span></div>
<div class="h"><span class="bar b-warn"></span><span>Divisão de Gastos</span></div>
<div class="h"><span class="bar b-danger"></span><span>Alertas críticos</span></div>
<div class="note">4×16 gradient bar + glow in the section's primary color. Always paired with an uppercase title at 15 px, letter-spacing 0.6.</div>
