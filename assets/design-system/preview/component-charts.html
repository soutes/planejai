<!doctype html><meta charset="utf-8">
<title>Charts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B0E13;color:#E8ECF2;padding:18px 24px;display:flex;gap:24px;align-items:center}
  .card{background:linear-gradient(135deg,#0D1420,#111827);border:1px solid #1A2030;border-radius:14px;padding:16px 20px;flex:1}
  .title{font-size:12px;font-weight:700;color:#C8CDD6;margin-bottom:10px}
  .donut-wrap{display:flex;align-items:center;gap:18px}
  .donut{position:relative;width:130px;height:130px}
  .legend{display:flex;flex-direction:column;gap:6px;font-size:11px;color:#C8CDD6}
  .legend span{display:flex;align-items:center;gap:8px}
  .legend .d{width:9px;height:9px;border-radius:50%}
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .center .l{font-size:9px;color:#8B92A0;letter-spacing:1.5px;font-weight:600}
  .center .v{font-size:15px;font-weight:800;color:#E8ECF2;font-variant-numeric:tabular-nums}
  .bars{display:flex;align-items:flex-end;gap:14px;height:130px;padding:0 4px}
  .bar-group{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
  .stack{display:flex;gap:3px;align-items:flex-end;height:110px}
  .bar{width:14px;border-radius:2px 2px 0 0}
  .bar.r{background:#10F5A344;border:1px solid #10F5A3}
  .bar.d{background:#FF6B7A44;border:1px solid #FF6B7A}
  .ml{font-size:10px;color:#4E5768;font-weight:600;font-variant-numeric:tabular-nums}
</style>
<div class="card">
  <div class="title">Despesas por Categoria</div>
  <div class="donut-wrap">
    <div class="donut">
      <svg viewBox="0 0 36 36" width="130" height="130">
        <circle cx="18" cy="18" r="14" fill="none" stroke="#0B0E13" stroke-width="6"/>
        <circle cx="18" cy="18" r="14" fill="none" stroke="#FF4B6E" stroke-width="6" stroke-dasharray="25 88" transform="rotate(-90 18 18)"/>
        <circle cx="18" cy="18" r="14" fill="none" stroke="#B07AFF" stroke-width="6" stroke-dasharray="16 88" stroke-dashoffset="-25" transform="rotate(-90 18 18)"/>
        <circle cx="18" cy="18" r="14" fill="none" stroke="#6FA9D6" stroke-width="6" stroke-dasharray="13 88" stroke-dashoffset="-41" transform="rotate(-90 18 18)"/>
        <circle cx="18" cy="18" r="14" fill="none" stroke="#F4A261" stroke-width="6" stroke-dasharray="10 88" stroke-dashoffset="-54" transform="rotate(-90 18 18)"/>
        <circle cx="18" cy="18" r="14" fill="none" stroke="#5A6273" stroke-width="6" stroke-dasharray="24 88" stroke-dashoffset="-64" transform="rotate(-90 18 18)"/>
      </svg>
      <div class="center"><div class="l">TOTAL</div><div class="v">R$ 5.781</div></div>
    </div>
    <div class="legend">
      <span><span class="d" style="background:#FF4B6E"></span>Alimentação</span>
      <span><span class="d" style="background:#B07AFF"></span>Assinaturas</span>
      <span><span class="d" style="background:#6FA9D6"></span>Transporte</span>
      <span><span class="d" style="background:#F4A261"></span>Lazer</span>
      <span><span class="d" style="background:#5A6273"></span>Outros</span>
    </div>
  </div>
</div>
<div class="card">
  <div class="title">Evolução Mensal</div>
  <div class="bars">
    <div class="bar-group"><div class="stack"><div class="bar r" style="height:60%"></div><div class="bar d" style="height:50%"></div></div><span class="ml">Jan/26</span></div>
    <div class="bar-group"><div class="stack"><div class="bar r" style="height:65%"></div><div class="bar d" style="height:54%"></div></div><span class="ml">Fev/26</span></div>
    <div class="bar-group"><div class="stack"><div class="bar r" style="height:70%"></div><div class="bar d" style="height:60%"></div></div><span class="ml">Mar/26</span></div>
    <div class="bar-group"><div class="stack"><div class="bar r" style="height:72%"></div><div class="bar d" style="height:58%"></div></div><span class="ml">Abr/26</span></div>
    <div class="bar-group"><div class="stack"><div class="bar r" style="height:80%"></div><div class="bar d" style="height:70%"></div></div><span class="ml">Mai/26</span></div>
  </div>
</div>
