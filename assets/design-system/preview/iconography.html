<!doctype html><meta charset="utf-8">
<title>Iconography</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B0E13;color:#E8ECF2;padding:24px 28px;display:flex;flex-direction:column;gap:14px}
  .tag{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#6E7A8C;font-weight:700}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}
  .icon-tile{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;background:#10141C;border:1px solid #1F2530;border-radius:10px}
  .icon-tile svg{display:block}
  .icon-tile .l{font-size:9.5px;color:#8B92A0;font-weight:600;letter-spacing:0.2px}
  .emoji-row{display:flex;flex-wrap:wrap;gap:14px;font-size:24px;align-items:center;padding:8px 4px}
  .emoji-row span{display:inline-flex;flex-direction:column;align-items:center;gap:2px}
  .emoji-row span small{font-size:9.5px;color:#6E7A8C;font-weight:600;letter-spacing:0.2px}
</style>
<div>
  <div class="tag" style="margin-bottom:8px">SVG glyphs · stroke-width 2 · round caps · color #E8ECF2 — embedded inline in src/ui.py</div>
  <div class="row">
    <div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2.5"/><line x1="2" y1="10" x2="22" y2="10"/><line x1="6" y1="15" x2="10" y2="15"/></svg><span class="l">card</span></div>
    <div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span class="l">upload</span></div>
    <div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span class="l">clock</span></div>
    <div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="l">folder</span></div>
    <div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg><span class="l">trash</span></div>
    <div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span class="l">warn</span></div>
    <div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span class="l">chart</span></div>
    <div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span class="l">book</span></div>
  </div>
</div>
<div>
  <div class="tag" style="margin-bottom:8px">Functional emoji — nav, categories, page heads — Lucide-compatible stroke style</div>
  <div class="emoji-row">
    <span>🏠<small>visão</small></span>
    <span>💰<small>rend</small></span>

    <span>➕<small>add</small></span>
    <span>✕<small>close</small></span>
    <span>⚠️<small>warn</small></span>
  </div>
</div>
