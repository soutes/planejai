<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>planejAÍ — UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../components.css">
<link rel="stylesheet" href="./kit.css">
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="./Icons.jsx"></script>
<script type="text/babel" src="./Components.jsx"></script>
<script type="text/babel" src="./Sidebar.jsx"></script>
<script type="text/babel" src="./Pages.jsx"></script>

<script type="text/babel" data-presets="env,react">
const MESES_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const App = () => {
  const [page, setPage] = React.useState('cartao');
  const [monthIdx, setMonthIdx] = React.useState(4); // Maio
  const year = 2026;
  const monthLabel = `${MESES_PT[monthIdx]} ${year}`;

  const stepMonth = (dir) => {
    setMonthIdx(prev => (prev + dir + 12) % 12);
  };

  return (
    <div className="kit-app" data-screen-label={`planejAÍ · ${page}`}>
      <Sidebar
        page={page}
        onPage={setPage}
        month={monthLabel}
        onMonth={stepMonth}
      />
      <main className="kit-main">
        {page === 'visao_geral'  && <VisaoGeral month={monthLabel}/>}
        {page === 'rendimentos'  && <RendimentosPage/>}
        {page === 'despesas'     && <DespesasPage/>}
        {page === 'cartao'       && <CartaoPage/>}
        {page === 'investimentos'&& <InvestPage/>}
        {page === 'config'       && <ConfigPage/>}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<!-- Direct-edit override block for tweaks from the editor pane -->
<style id="__om-edit-overrides"></style>
</body>
</html>
