<!doctype html><meta charset="utf-8">
<title>Charts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B0E13;color:#E8ECF2;padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch;font-optical-sizing:auto;box-sizing:border-box;height:240px}
  .card{background:linear-gradient(135deg,#0D1420,#111827);border:1px solid #1A2030;border-radius:14px;padding:14px 18px;display:flex;flex-direction:column;gap:6px;overflow:hidden}
  .title{font-size:12px;font-weight:700;color:#C8CDD6;letter-spacing:0.2px}
  .sub{font-size:10px;color:#6E7A8C;font-weight:500;letter-spacing:0.3px;text-transform:uppercase}
  /* ---- Donut ---- */
  .donut-row{display:flex;align-items:center;gap:14px;flex:1}
  .donut-wrap{position:relative;width:160px;height:160px;flex-shrink:0}
  .donut-svg{display:block;width:100%;height:100%}
  .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .donut-center .c-lbl{font-size:8.5px;color:#8B92A0;letter-spacing:1.8px;font-weight:700}
  .donut-center .c-val{font-size:18px;font-weight:800;color:#E8ECF2;font-variant-numeric:tabular-nums;letter-spacing:-0.025em;margin-top:2px;font-variation-settings:'opsz' 32}
  .legend{display:flex;flex-direction:column;gap:5px;font-size:11px;color:#C8CDD6;flex:1;min-width:0}
  .legend .li{display:grid;grid-template-columns:9px 1fr auto;gap:8px;align-items:center}
  .legend .d{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .legend .n{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .legend .v{font-size:10px;color:#6E7A8C;font-variant-numeric:tabular-nums;font-weight:600}
  /* ---- Line ---- */
  .line-wrap{flex:1;position:relative;min-height:0}
  .y-axis{position:absolute;left:0;top:4px;bottom:22px;width:38px;display:flex;flex-direction:column;justify-content:space-between;font-size:9px;color:#4E5768;font-variant-numeric:tabular-nums;text-align:right;padding-right:6px;font-weight:600}
  .x-axis{position:absolute;left:38px;right:0;bottom:0;height:18px;display:flex;justify-content:space-between;font-size:9.5px;color:#4E5768;font-variant-numeric:tabular-nums;font-weight:600;padding:0 6px}
  .line-svg{position:absolute;left:38px;right:0;top:0;bottom:24px;width:auto;height:auto}
</style>

<!-- ============ DONUT — categorias ============ -->

  <div class="donut-row">

        <div class="li"><span class="d" style="background:#5A6273"></span><span class="n">Outros</span><span class="v">874</span></div>
    </div>
  </div>
</div>
