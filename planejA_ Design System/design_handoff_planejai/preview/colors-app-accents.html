<!doctype html><meta charset="utf-8">
<title>App accents</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B0E13;color:#E8ECF2}
  .wrap{padding:24px 28px;display:flex;flex-direction:column;gap:14px}
  .tag{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:#6E7A8C;font-weight:700}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{display:flex;flex-direction:column;gap:6px}
  .chip{height:60px;border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
  .meta{display:flex;justify-content:space-between;align-items:baseline}
  .meta b{font-size:11px;font-weight:700;color:#E8ECF2}
  .meta span{font-size:10px;color:#6E7A8C;font-variant-numeric:tabular-nums;letter-spacing:0.4px}
  .role{font-size:10px;color:#8B92A0;font-weight:500;line-height:1.35}
</style>
<div class="wrap">
  <div class="tag">App accents — current Streamlit UI (neon green is THE primary)</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#10F5A3;box-shadow:0 0 18px rgba(16,245,163,0.35)"></div>
      <div class="meta"><b>accent</b><span>#10F5A3</span></div><div class="role">CTA · saldo positivo</div></div>
    <div class="sw"><div class="chip" style="background:#0FCC88"></div>
      <div class="meta"><b>accent-soft</b><span>#0FCC88</span></div><div class="role">gradient pair</div></div>
    <div class="sw"><div class="chip" style="background:#B07AFF;box-shadow:0 0 14px rgba(176,122,255,0.30)"></div>
      <div class="meta"><b>purple</b><span>#B07AFF</span></div><div class="role">categorias</div></div>
    <div class="sw"><div class="chip" style="background:#6FA9D6"></div>
      <div class="meta"><b>blue</b><span>#6FA9D6</span></div><div class="role">abas / info</div></div>
    <div class="sw"><div class="chip" style="background:#FFB347"></div>
      <div class="meta"><b>warn</b><span>#FFB347</span></div><div class="role">atenção</div></div>
    <div class="sw"><div class="chip" style="background:#FF6B7A;box-shadow:0 0 14px rgba(255,107,122,0.30)"></div>
      <div class="meta"><b>danger</b><span>#FF6B7A</span></div><div class="role">saldo negativo</div></div>
  </div>
</div>
