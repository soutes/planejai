<!doctype html><meta charset="utf-8">
<title>Big progress bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B0E13;color:#E8ECF2;padding:24px 28px;display:flex;flex-direction:column;gap:14px}
  .af-bigbar-card{background:radial-gradient(ellipse 70% 100% at 0% 0%,rgba(255,255,255,0.025) 0%,transparent 60%),#10141C;border:1px solid #1F2530;border-radius:16px;padding:22px 26px}
  .head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
  .l{font-size:11px;letter-spacing:0.7px;text-transform:uppercase;color:#4E5768;font-weight:600;margin-bottom:4px}
  .v{font-size:26px;font-weight:800;line-height:1.1;font-variant-numeric:tabular-nums;letter-spacing:-0.3px}
  .of{font-size:13px;color:#4E5768;font-weight:500;margin-left:8px}
  .track{position:relative;height:14px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);overflow:hidden}
  .fill{position:absolute;top:0;left:0;bottom:0;border-radius:7px}
  .foot{margin-top:10px;font-size:12px;letter-spacing:0.4px;display:flex;justify-content:space-between;align-items:center}
  .upd{color:#6E7A8C;font-size:11px;font-variant-numeric:tabular-nums}
</style>
<div class="af-bigbar-card">
  <div class="head">
    <div><div class="l">Gasto no ciclo</div><div class="v" style="color:#10F5A3">R$ 2.143,80<span class="of">de R$ 5.900,00</span></div></div>
    <div style="text-align:right"><div class="l">Saldo disponível</div><div class="v" style="color:#10F5A3">R$ 3.756,20</div></div>
  </div>
  <div class="track"><div class="fill" style="width:36.3%;background:linear-gradient(90deg,#10F5A300 0%,#10F5A366 25%,#10F5A3 100%);box-shadow:0 0 12px rgba(16,245,163,0.6),0 0 24px rgba(16,245,163,0.27)"></div></div>
  <div class="foot"><span style="color:#10F5A3;font-weight:700">36.3% do limite</span><span class="upd">Atualizado 14:22 · 03/05/2026</span></div>
</div>
<div class="af-bigbar-card">
  <div class="head">
    <div><div class="l">Gasto no ciclo</div><div class="v" style="color:#FF6B7A">R$ 6.420,00<span class="of">de R$ 5.900,00</span></div></div>
    <div style="text-align:right"><div class="l">Estourou em</div><div class="v" style="color:#FF6B7A">R$ 520,00</div></div>
  </div>
  <div class="track"><div class="fill" style="width:100%;background:linear-gradient(90deg,#FF6B7A00 0%,#FF6B7A66 25%,#FF6B7A 100%);box-shadow:0 0 12px rgba(255,107,122,0.6),0 0 24px rgba(255,107,122,0.27)"></div></div>
  <div class="foot"><span style="color:#FF6B7A;font-weight:700">108.8% do limite</span><span class="upd">Atualizado 09:14 · 12/05/2026</span></div>
</div>
