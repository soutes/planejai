<!doctype html><meta charset="utf-8">
<title>Glow KPI box</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#0B0E13;color:#E8ECF2;padding:24px 28px}
  .af-glow{position:relative;background:radial-gradient(ellipse 80% 100% at 0% 0%,rgba(16,245,163,0.12) 0%,rgba(16,245,163,0.02) 35%,transparent 70%),linear-gradient(135deg,rgba(16,245,163,0.04) 0%,rgba(0,0,0,0) 60%),#10141C;border:1px solid rgba(16,245,163,0.25);border-radius:18px;padding:22px 24px;box-shadow:0 0 1px rgba(16,245,163,0.4),0 0 24px rgba(16,245,163,0.12),0 0 60px rgba(16,245,163,0.06),inset 0 1px 0 rgba(255,255,255,0.03)}
  .af-glow::before{content:"";position:absolute;top:-1px;left:-1px;right:-1px;height:1px;background:linear-gradient(90deg,transparent,rgba(16,245,163,0.6),transparent);border-radius:18px 18px 0 0}
  .af-glow-title{font-size:11px;letter-spacing:0.8px;text-transform:uppercase;color:#10F5A3;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .af-glow-title::before{content:"";width:6px;height:6px;border-radius:50%;background:#10F5A3;box-shadow:0 0 8px #10F5A3,0 0 16px #10F5A3}
  .grid{display:grid;grid-template-columns:repeat(5,1fr)}
  .cell{padding:4px 18px;border-right:1px solid rgba(255,255,255,0.05)}
  .cell:first-child{padding-left:4px}
  .cell:last-child{border-right:none}
  .l{font-size:10px;letter-spacing:0.7px;text-transform:uppercase;color:#4E5768;font-weight:600;margin-bottom:4px}
  .v{font-size:22px;font-weight:700;color:#E8ECF2;line-height:1.15;font-variant-numeric:tabular-nums}
  .s{font-size:11px;color:#8B92A0;margin-top:4px}
</style>
<div class="af-glow">
  <div class="af-glow-title">Indicadores do Ciclo</div>
  <div class="grid">
    <div class="cell"><div class="l">Pace</div><div class="v" style="color:#10F5A3">No ritmo</div><div class="s">gasto 38% · tempo 41%</div></div>
    <div class="cell"><div class="l">Forecast fechamento</div><div class="v" style="color:#10F5A3">R$ 4.832,00</div><div class="s">82% do limite</div></div>
    <div class="cell"><div class="l">Pode gastar/dia</div><div class="v">R$ 76,40</div><div class="s">nos próximos 17 dias</div></div>
    <div class="cell"><div class="l">Ritmo atual</div><div class="v">R$ 184,30</div><div class="s">por dia decorrido</div></div>
    <div class="cell"><div class="l">Transações</div><div class="v">38</div></div>
  </div>
</div>
